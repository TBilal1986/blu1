<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="School themed abstract background placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Abstract arcs -->
  <g opacity="0.25">
    <circle cx="1400" cy="-50" r="420" fill="#93c5fd"/>
    <circle cx="-50" cy="140" r="360" fill="#86efac"/>
  </g>

  <!-- Chalkboard placeholder -->
  <g transform="translate(920,220)">
    <rect x="0" y="0" rx="16" ry="16" width="560" height="360" fill="url(#board)" stroke="#064e3b" stroke-width="6"/>
    <rect x="22" y="18" rx="10" ry="10" width="516" height="318" fill="#0b3a23" opacity="0.2"/>
    <!-- Chalk lines -->
    <g stroke="#e2e8f0" stroke-linecap="round" opacity="0.7">
      <line x1="60" y1="70" x2="340" y2="70" stroke-width="6"/>
      <line x1="60" y1="110" x2="420" y2="110" stroke-width="5"/>
      <line x1="60" y1="150" x2="380" y2="150" stroke-width="5"/>
      <line x1="60" y1="190" x2="460" y2="190" stroke-width="5"/>
      <line x1="60" y1="230" x2="300" y2="230" stroke-width="5"/>
    </g>
  </g>

  <!-- Desk stack -->
  <g transform="translate(140,520)" opacity="0.9">
    <rect x="0" y="0" width="360" height="200" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="24" y="28" width="312" height="14" rx="7" fill="#e2e8f0"/>
    <rect x="24" y="60" width="260" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="24" y="88" width="220" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="24" y="116" width="280" height="12" rx="6" fill="#e2e8f0"/>
  </g>

  <!-- Subtle noise overlay -->
  <rect width="1600" height="900" fill="#ffffff" opacity="0.08"/>
</svg>